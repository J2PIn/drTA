<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TA Chart Tool</title>
  </head>
  <body>
    <div id="app">
      <div class="topbar">
        <input id="api" placeholder="Worker API base URL (no /chart)" />
        <button id="run">Generate chart</button>
      </div>

      <textarea id="input" spellcheck="false"></textarea>

      <div class="grid">
        <div class="panel">
          <div class="label">Price</div>
          <div id="price" class="chart"></div>
        </div>
        <div class="panel">
          <div class="label">Volume</div>
          <div id="volume" class="chart"></div>
        </div>
        <div class="panel">
          <div class="label">RSI</div>
          <div id="rsi" class="chart"></div>
        </div>
        <div class="panel">
          <div class="label">MACD</div>
          <div id="macd" class="chart"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
